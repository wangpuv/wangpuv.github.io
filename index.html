<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="王普 — 后端开发工程师、架构师、AI Agent 工程师。真实工程项目与技术经历。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Geist:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Set theme + language before paint to avoid a flash of the wrong state.
      (function () {
        var de = document.documentElement;
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          de.setAttribute('data-theme', stored || (prefersDark ? 'dark' : 'light'));
        } catch (e) {}
        try {
          var lang = localStorage.getItem('lang');
          if (lang !== 'zh' && lang !== 'en') {
            var langs = navigator.languages || [navigator.language || ''];
            var lower = langs.map(function (l) { return l.toLowerCase(); });
            var prefersZh = lower.some(function (l) { return l.indexOf('zh') === 0; });
            var prefersEn = lower.some(function (l) { return l.indexOf('en') === 0; });
            lang = (prefersEn && !prefersZh) ? 'en' : 'zh';
          }
          de.setAttribute('lang', lang === 'zh' ? 'zh-CN' : 'en');
        } catch (e) {}
      })();
    </script>
    <title>王普 — 后端开发工程师 / 架构师 / AI Agent 工程师</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
